# Fly.io config for the Helm SPA. Change `app` if the name is taken
# (it must be globally unique). Region `arn` (Stockholm) sits next to the
# Supabase project in eu-north-1.
app = "helm-trading"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
