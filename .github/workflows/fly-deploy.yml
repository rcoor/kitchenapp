name: Deploy to Fly.io

# Auto-deploys the SPA to Fly whenever master moves (i.e. when a PR merges),
# plus a manual trigger. Requires a FLY_API_TOKEN repo secret.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # never run two deploys at once
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --remote-only builds on Fly's builders, so no local Docker is needed.
      # The Supabase URL + publishable key come from the Dockerfile build-arg
      # defaults (both are public client values).
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
